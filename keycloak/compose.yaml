services:
  keycloak:
    image: ${KEYCLOAK_IMAGE:-taalam/fineract-keycloak-sso:latest}
    container_name: fincore-kc
    restart: unless-stopped

    # The startup command (start / start-dev, --import-realm) is set per
    # environment in compose.prod.yaml / compose.local.yaml.

    env_file:
      - ./.env

    expose:
      - "8080"

    volumes:
      - keycloak_data:/opt/keycloak/data
      # Realm bootstrap (imported on first boot with --import-realm)
      - ./import:/opt/keycloak/data/import:ro

    networks:
      - fincore

volumes:
  keycloak_data:

networks:
  fincore:
    external: true
